services:
  postgres:
    image: postgres:16-alpine
    container_name: behavior_analytics_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: behavior_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d behavior_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
